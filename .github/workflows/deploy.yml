name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ffmpeg and dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pygbag

      - name: Convert WAV to OGG for web
        run: |
          for f in assets/*.wav; do
            [ -f "$f" ] && ffmpeg -y -i "$f" -c:a libvorbis -q:a 4 "${f%.wav}.ogg"
          done

      - name: Prepare minimal web source package
        run: |
          rm -rf web_release_src
          mkdir -p web_release_src/assets
          cp main.py config.json web_release_src/
          for f in assets/*; do
            [ -f "$f" ] || continue
            case "$f" in
              *.ogg|*.png|*.gif|*.jpg|*.jpeg|*.webp|*.txt|*.json)
                cp "$f" web_release_src/assets/
                ;;
            esac
          done

      - name: Build with pygbag (minimal package)
        run: |
          cd web_release_src
          python -m pygbag --build main.py

      - name: Optimize HTML for mobile browsers
        run: |
          python3 << 'PYEOF'
          import os
          index = "web_release_src/build/web/index.html"
          if not os.path.isfile(index):
              print(f"WARNING: {index} not found, skipping mobile optimization")
          else:
              with open(index, "r", encoding="utf-8") as f:
                  html = f.read()

              viewport = '<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">'
              pwa_meta = '<meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"><meta name="mobile-web-app-capable" content="yes">'
              mobile_css = """<style>
          html, body { overscroll-behavior: none; overflow: hidden; position: fixed; width: 100%; height: 100%; margin: 0; padding: 0; background: #000; }
          canvas.emscripten, #canvas { touch-action: none; }
          #infobox { touch-action: manipulation; cursor: pointer; z-index: 999; }
          .infobox-hidden, .infobox-hidden * { display: none !important; visibility: hidden !important; height: 0 !important; overflow: hidden !important; pointer-events: none !important; }
          </style>"""
              mobile_js = """<script>
          (function () {
            let touched = false;
            let gameStarted = false;
            function forceHideInfobox() {
              try {
                var targets = [window.infobox, document.getElementById("infobox"), document.getElementById("info")];
                for (var i = 0; i < targets.length; i++) {
                  if (targets[i]) {
                    targets[i].style.cssText = "display:none!important;visibility:hidden!important;height:0!important;overflow:hidden!important;pointer-events:none!important;";
                    targets[i].classList.add("infobox-hidden");
                    targets[i].innerHTML = "";
                  }
                }
              } catch (e) {}
              gameStarted = true;
            }
            function setInfoText(msg) {
              if (gameStarted) return;
              try {
                if (window.infobox) {
                  window.infobox.style.display = "block";
                  window.infobox.innerText = msg;
                }
              } catch (e) {}
            }
            function tryFullscreen() {
              try {
                var el = document.documentElement;
                if (el.requestFullscreen) { el.requestFullscreen().catch(function(){}); }
                else if (el.webkitRequestFullscreen) { el.webkitRequestFullscreen(); }
                else if (el.msRequestFullscreen) { el.msRequestFullscreen(); }
              } catch (e) {}
            }
            function markInteraction() {
              if (touched) return;
              touched = true;
              try {
                if (window.MM) { window.MM.UME = true; }
                if (window.Module && window.Module.canvas) { window.Module.canvas.focus(); }
              } catch (e) {}
              tryFullscreen();
              setInfoText("Starte Spiel... bitte kurz warten");
              setTimeout(forceHideInfobox, 6000);
            }
            setInfoText("Lade Inhalte... Erster Start kann 10-30s dauern. Einmal tippen.");
            document.addEventListener("touchstart", markInteraction, { passive: true });
            document.addEventListener("pointerdown", markInteraction, { passive: true });
            document.addEventListener("click", markInteraction, { passive: true });
            var umeTimer = setInterval(function () {
              if (touched && window.MM) {
                window.MM.UME = true;
                clearInterval(umeTimer);
              }
            }, 200);
            var hideTimer = setInterval(function () {
              try {
                var running = (window.Module && (window.Module.calledRun || window.Module.ctx));
                if (running) { forceHideInfobox(); clearInterval(hideTimer); }
              } catch (e) {}
            }, 500);
            setTimeout(function () { forceHideInfobox(); clearInterval(hideTimer); }, 20000);
          })();
          </script>"""

              if "<head>" in html:
                  html = html.replace("<head>", f"<head>\n{viewport}\n{pwa_meta}", 1)
              elif "<HEAD>" in html:
                  html = html.replace("<HEAD>", f"<HEAD>\n{viewport}\n{pwa_meta}", 1)

              if "</head>" in html:
                  html = html.replace("</head>", f"{mobile_css}\n</head>", 1)
              elif "</HEAD>" in html:
                  html = html.replace("</HEAD>", f"{mobile_css}\n</HEAD>", 1)

              if "</body>" in html:
                  html = html.replace("</body>", f"{mobile_js}\n</body>", 1)
              elif "</BODY>" in html:
                  html = html.replace("</BODY>", f"{mobile_js}\n</BODY>", 1)

              with open(index, "w", encoding="utf-8") as f:
                  f.write(html)
              print("Mobile optimizations applied to index.html")
          PYEOF

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web_release_src/build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
